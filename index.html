<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerador de Senhas</title>
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="stylesheet" href="./assets/fonts.css" />
  </head>
  <body>
    <h1>Gerador de Senhas Aleatórias</h1>
    <div class="container">
      <div class="pass">
        <input type="text" id="outPass" readonly />
        <button id="buttonCopy">COPIAR</button>
      </div>
      <div class="pass-length">
        <span class="span-pass-length">25</span>
        <button class="minus-button">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            fill="currentColor"
            class="bi bi-dash"
            viewBox="0 0 16 16"
          >
            <path
              d="M4 8a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7A.5.5 0 0 1 4 8z"
            />
          </svg>
        </button>
        <input
          type="range"
          name="PassLength"
          min="1"
          max="50"
          value="25"
          id="passLength"
        />
        <button class="plus-button">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            fill="currentColor"
            class="bi bi-plus"
            viewBox="0 0 16 16"
          >
            <path
              d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"
            />
          </svg>
        </button>
      </div>
      <div class="pass-chr">
        <div class="checkbox">
          <input
            type="checkbox"
            name="Letras Maiúsculas"
            id="chkUpperCase"
          checked/><label for="Letras Maiúsculas">Letras Maiúsculas (A-Z)</label>
        </div>
        <div class="checkbox">
          <input
            type="checkbox"
            name="Letras Minúsculas"
            id="chkLowerCase"
            checked/><label for="Letras Minúsculas">Letras Minúsculas (a-z)</label>
        </div>
        <div class="checkbox">
          <input type="checkbox" name="Números" id="chkNumbers" checked/><label
            for="Números"
            >Números (123)</label
          >
        </div>
        <div class="checkbox">
          <input type="checkbox" name="Símbolos" id="chkSymbols" checked/><label
            for="Símbolos"
            >Símbolos (#$&)</label
          >
        </div>
      </div>
    </div>
  </body>
  <script src="app.js"></script>
</html>
